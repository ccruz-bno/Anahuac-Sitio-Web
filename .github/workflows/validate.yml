name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  consistency:
    name: Consistencia de diseño
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Readiness gate (Figma ingestado, sin placeholders)
        run: npm run check:readiness
      - name: Check tokens (cero hardcode)
        run: npm run check:tokens
      - name: Lint CSS (stylelint)
        run: npm run lint:css
      # - name: Accesibilidad (pa11y/axe contra preview)  # ver docs/quality.md
      #   run: npm run a11y

  gate:
    name: Gate de revisión humana
    runs-on: ubuntu-latest
    steps:
      - run: echo "La aprobación humana se exige vía CODEOWNERS + branch protection (ver docs/ci.md)."
